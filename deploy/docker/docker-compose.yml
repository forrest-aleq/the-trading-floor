version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: tradingfloor
      POSTGRES_USER: floor
      POSTGRES_PASSWORD: floor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U floor -d tradingfloor"]
      interval: 5s
      timeout: 5s
      retries: 5

  floor:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # IBKR Gateway — connect to host machine where Gateway runs
      IBKR_HOST: host.docker.internal
      IBKR_PORT: "4002"
      IBKR_CLIENT_ID: "1"

      # PostgreSQL
      DATABASE_URL: postgres://floor:floor@postgres:5432/tradingfloor?sslmode=disable

      # LLM — set your OpenRouter API key
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL_SPEED: ${LLM_MODEL_SPEED:-qwen/qwen3.5-7b}
      LLM_MODEL_ANALYSIS: ${LLM_MODEL_ANALYSIS:-qwen/qwen3.5-72b}
      LLM_MODEL_CRITICAL: ${LLM_MODEL_CRITICAL:-anthropic/claude-sonnet-4-20250514}

      TRADING_FLOOR_MIGRATION_PATH: /migrations/001_init.sql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  pgdata:
